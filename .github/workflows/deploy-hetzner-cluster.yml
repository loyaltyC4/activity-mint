name: Deploy Hetzner Cluster

# Triggered manually via workflow_dispatch. Runs on a GitHub-hosted runner
# (unrestricted outbound network) and SSHs into the Hetzner server to deploy
# / inspect the 5-worker scraping cluster.
#
# The actual action logic lives in hetzner-cluster/cluster-action.sh — kept
# out of this YAML because the run-block expression had grown past the
# GitHub Actions 21,000-char limit. This file is just a wrapper that
# injects secrets as env vars and execs the script with $ACTION.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - status
          - restart
          - logs
          - diagnostics
          - smoke
          - test_each
          - test_proxies
          - reset_worker_1
          - reset_worker_4
          - test_tiktok_login
          - test_unsuspend_w4
          - probe_posts_html

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Run cluster action
        env:
          HETZNER_HOST: 46.224.227.199
          HETZNER_USER: root
          HETZNER_PASSWORD: ${{ secrets.HETZNER_SSH_PASSWORD }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          IG_USER_1: ${{ secrets.IG_USER_1 }}
          IG_PASS_1: ${{ secrets.IG_PASS_1 }}
          IG_2FA_1: ${{ secrets.IG_2FA_1 }}
          IG_USER_2: ${{ secrets.IG_USER_2 }}
          IG_PASS_2: ${{ secrets.IG_PASS_2 }}
          IG_2FA_2: ${{ secrets.IG_2FA_2 }}
          IG_USER_3: ${{ secrets.IG_USER_3 }}
          IG_PASS_3: ${{ secrets.IG_PASS_3 }}
          IG_2FA_3: ${{ secrets.IG_2FA_3 }}
          IG_USER_4: ${{ secrets.IG_USER_4 }}
          IG_PASS_4: ${{ secrets.IG_PASS_4 }}
          IG_2FA_4: ${{ secrets.IG_2FA_4 }}
          IG_USER_5: ${{ secrets.IG_USER_5 }}
          IG_PASS_5: ${{ secrets.IG_PASS_5 }}
          IG_2FA_5: ${{ secrets.IG_2FA_5 }}
          TT_USERNAME:   ${{ secrets.TT_USERNAME }}
          TT_PASSWORD:   ${{ secrets.TT_PASSWORD }}
          TT_EMAIL:      ${{ secrets.TT_EMAIL }}
          TT_EMAIL_PASS: ${{ secrets.TT_EMAIL_PASS }}
          TT_PROXY_HOST: ${{ secrets.TT_PROXY_HOST }}
        run: bash hetzner-cluster/cluster-action.sh "${{ inputs.action }}"
