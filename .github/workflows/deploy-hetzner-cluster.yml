name: Deploy Hetzner Cluster

# Triggered manually via workflow_dispatch. Runs on a GitHub-hosted runner
# (unrestricted outbound network) and SSHs into the Hetzner server to deploy
# the 5-worker scraping cluster.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - status
          - restart
          - logs
          - diagnostics
          - smoke
          - test_each
          - test_proxies
          - bisect_login
          - reset_worker_1
          - test_tiktok_login

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Run remote ${{ inputs.action }}
        env:
          HETZNER_HOST: 46.224.227.199
          HETZNER_USER: root
          HETZNER_PASSWORD: ${{ secrets.HETZNER_SSH_PASSWORD }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          IG_USER_1: ${{ secrets.IG_USER_1 }}
          IG_PASS_1: ${{ secrets.IG_PASS_1 }}
          IG_2FA_1: ${{ secrets.IG_2FA_1 }}
          IG_USER_2: ${{ secrets.IG_USER_2 }}
          IG_PASS_2: ${{ secrets.IG_PASS_2 }}
          IG_2FA_2: ${{ secrets.IG_2FA_2 }}
          IG_USER_3: ${{ secrets.IG_USER_3 }}
          IG_PASS_3: ${{ secrets.IG_PASS_3 }}
          IG_2FA_3: ${{ secrets.IG_2FA_3 }}
          IG_USER_4: ${{ secrets.IG_USER_4 }}
          IG_PASS_4: ${{ secrets.IG_PASS_4 }}
          IG_2FA_4: ${{ secrets.IG_2FA_4 }}
          IG_USER_5: ${{ secrets.IG_USER_5 }}
          IG_PASS_5: ${{ secrets.IG_PASS_5 }}
          IG_2FA_5: ${{ secrets.IG_2FA_5 }}
          TT_USERNAME:   ${{ secrets.TT_USERNAME }}
          TT_PASSWORD:   ${{ secrets.TT_PASSWORD }}
          TT_EMAIL:      ${{ secrets.TT_EMAIL }}
          TT_EMAIL_PASS: ${{ secrets.TT_EMAIL_PASS }}
          TT_PROXY_HOST: ${{ secrets.TT_PROXY_HOST }}
        run: |
          set -e
          ACTION="${{ inputs.action }}"

          # Build the .env content (this stays in the runner's memory, never logged)
          ENV_CONTENT=$(cat <<EOF
          SCRAPER_SECRET=$SCRAPER_SECRET
          PROXY_USER=$PROXY_USER
          PROXY_PASS=$PROXY_PASS
          PROXY_HTTP_PORT=50100
          IG_USER_1=$IG_USER_1
          IG_PASS_1=$IG_PASS_1
          IG_2FA_1=$IG_2FA_1
          IG_USER_2=$IG_USER_2
          IG_PASS_2=$IG_PASS_2
          IG_2FA_2=$IG_2FA_2
          IG_USER_3=$IG_USER_3
          IG_PASS_3=$IG_PASS_3
          IG_2FA_3=$IG_2FA_3
          IG_USER_4=$IG_USER_4
          IG_PASS_4=$IG_PASS_4
          IG_2FA_4=$IG_2FA_4
          IG_USER_5=$IG_USER_5
          IG_PASS_5=$IG_PASS_5
          IG_2FA_5=$IG_2FA_5
          EOF
          )

          # Generic SSH wrapper: each block prints its own progress
          ssh_run() {
            sshpass -p "$HETZNER_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              "$HETZNER_USER@$HETZNER_HOST" \
              "$@"
          }

          # ── DEPLOY ─────────────────────────────────────────────────────────
          if [ "$ACTION" = "deploy" ]; then
            echo "==> Verifying SSH connection..."
            ssh_run "echo OK && uname -a && (docker --version || echo 'docker not installed')"

            echo "==> Installing docker (if missing) + docker compose plugin..."
            ssh_run "command -v docker >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq docker.io docker-compose-v2 git curl openssl)"

            echo "==> Cloning/updating repo..."
            ssh_run "mkdir -p /opt/activitymint && cd /opt/activitymint && (
              if [ -d .git ]; then
                git fetch --all && git reset --hard origin/main
              else
                git clone https://github.com/loyaltyC4/activity-mint.git .
              fi
            )"

            echo "==> Writing .env on Hetzner (transferred via stdin, never logged)..."
            echo "$ENV_CONTENT" | sshpass -p "$HETZNER_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              "$HETZNER_USER@$HETZNER_HOST" \
              "cat > /opt/activitymint/.env && chmod 600 /opt/activitymint/.env && echo '.env written ('$(wc -l < /opt/activitymint/.env)' lines)'"

            echo "==> Stopping any existing scraper on port 3001 (old single-container service)..."
            ssh_run "docker ps --filter 'publish=3001' -q | xargs -r docker stop"
            ssh_run "docker ps -a --filter 'publish=3001' -q | xargs -r docker rm"

            echo "==> Running deploy.sh..."
            ssh_run "cd /opt/activitymint && bash hetzner-cluster/deploy.sh 2>&1 | tail -80"

            echo "==> Final health check..."
            sleep 10
            ssh_run "source /opt/activitymint/.env && curl -s -H \"X-Secret: \$SCRAPER_SECRET\" http://localhost:3001/health | python3 -m json.tool 2>&1 | head -100"
          fi

          # ── STATUS ─────────────────────────────────────────────────────────
          if [ "$ACTION" = "status" ]; then
            ssh_run "cd /opt/activitymint && docker compose -f hetzner-cluster/docker-compose.yml ps"
            echo "==> Worker health:"
            ssh_run "source /opt/activitymint/.env && curl -s -H \"X-Secret: \$SCRAPER_SECRET\" http://localhost:3001/health | python3 -m json.tool"
          fi

          # ── RESTART ────────────────────────────────────────────────────────
          if [ "$ACTION" = "restart" ]; then
            ssh_run "cd /opt/activitymint && docker compose -f hetzner-cluster/docker-compose.yml --env-file /opt/activitymint/.env restart"
          fi

          # ── LOGS ───────────────────────────────────────────────────────────
          if [ "$ACTION" = "logs" ]; then
            ssh_run "cd /opt/activitymint && docker compose -f hetzner-cluster/docker-compose.yml logs --tail=100"
          fi

          # ── BISECT_LOGIN — A/B test: is the FAILING account or the FAILING proxy at fault? ──
          # We run TWO one-off worker containers in parallel using the existing worker
          # image (already built on the host):
          #   A) FAILING ACCOUNT (nezaretci_01) + HEALTHY PROXY (65.195.109.107)
          #      → if this logs in, the account is fine; the proxy is the issue → buy proxies
          #      → if this fails, the account is bad → buy accounts
          #   B) HEALTHY ACCOUNT (nigar.fan.3) + FAILING PROXY (168.158.21.28)
          #      → if this logs in, the proxy is fine for logins; account 1 is bad → buy accounts
          #      → if this fails, the proxy is bad → buy proxies
          # Together these resolve which to replace.
          if [ "$ACTION" = "bisect_login" ]; then
            ssh_run "docker rm -f am_bisect_a am_bisect_b 2>/dev/null; rm -rf /tmp/bisect_a /tmp/bisect_b; mkdir -p /tmp/bisect_a /tmp/bisect_b && chmod 755 /tmp/bisect_a /tmp/bisect_b"
            # All credentials are already in the runner's env (from the step's env: block)
            # so they expand HERE on the runner before SSH sends them to Hetzner.
            echo "==> A: account=nezaretci_01 (acct 1, FAILING) + proxy=65.195.109.107 (proxy 3, HEALTHY)"
            ssh_run "docker run -d --name am_bisect_a --network hetzner-cluster_am_public \
              -e WORKER_ID=bisect_a \
              -e IG_USERNAME=$IG_USER_1 \
              -e IG_PASSWORD=$IG_PASS_1 \
              -e IG_2FA_SECRET=$IG_2FA_1 \
              -e PROXY_HOST=65.195.109.107 \
              -e PROXY_USER=$PROXY_USER \
              -e PROXY_PASS=$PROXY_PASS \
              -e PROXY_HTTP_PORT=50100 \
              -e SCRAPER_SECRET=$SCRAPER_SECRET \
              -e PORT=3010 \
              -v /tmp/bisect_a:/app/profile \
              hetzner-cluster-worker_1 2>&1 | tail -1"
            echo "==> B: account=nigar.fan.3 (acct 3, HEALTHY) + proxy=168.158.21.28 (proxy 1, FAILING)"
            ssh_run "docker run -d --name am_bisect_b --network hetzner-cluster_am_public \
              -e WORKER_ID=bisect_b \
              -e IG_USERNAME=$IG_USER_3 \
              -e IG_PASSWORD=$IG_PASS_3 \
              -e IG_2FA_SECRET=$IG_2FA_3 \
              -e PROXY_HOST=168.158.21.28 \
              -e PROXY_USER=$PROXY_USER \
              -e PROXY_PASS=$PROXY_PASS \
              -e PROXY_HTTP_PORT=50100 \
              -e SCRAPER_SECRET=$SCRAPER_SECRET \
              -e PORT=3010 \
              -v /tmp/bisect_b:/app/profile \
              hetzner-cluster-worker_1 2>&1 | tail -1"
            echo ""
            echo "Waiting 70s for both to attempt login..."
            sleep 70
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "  A (failing acct + healthy proxy)"
            echo "════════════════════════════════════════════════════════════"
            ssh_run "docker exec am_bisect_a curl -s --max-time 5 http://localhost:3010/health | python3 -m json.tool 2>/dev/null || echo '(unreachable)'"
            echo ""
            echo "Last 25 log lines:"
            ssh_run "docker logs --tail 25 am_bisect_a 2>&1"
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "  B (healthy acct + failing proxy)"
            echo "════════════════════════════════════════════════════════════"
            ssh_run "docker exec am_bisect_b curl -s --max-time 5 http://localhost:3010/health | python3 -m json.tool 2>/dev/null || echo '(unreachable)'"
            echo ""
            echo "Last 25 log lines:"
            ssh_run "docker logs --tail 25 am_bisect_b 2>&1"
            echo ""
            echo "==> cleaning up bisect containers"
            ssh_run "docker rm -f am_bisect_a am_bisect_b 2>/dev/null; rm -rf /tmp/bisect_a /tmp/bisect_b"
          fi

          # ── TEST_PROXIES — verify each proxy independently of Instagram ──
          # For each of the 5 proxy IPs, curl through HTTP and SOCKS5 to
          # api.ipify.org and (lightly) to instagram.com to see:
          #   - Does the proxy auth work at all?
          #   - What exit IP does it report (should match the proxy host)?
          #   - Does instagram.com respond, and with what code?
          if [ "$ACTION" = "test_proxies" ]; then
            for ip in 168.158.21.28 165.254.99.133 65.195.109.107 161.77.140.110 77.47.158.43 161.77.70.149; do
              echo "════════════════════════════════════════════════════════════"
              echo "  PROXY $ip"
              echo "════════════════════════════════════════════════════════════"
              echo "─ HTTP (port 50100) exit IP via api.ipify.org ─"
              ssh_run "curl -s --max-time 12 --proxy http://$PROXY_USER:$PROXY_PASS@${ip}:50100 https://api.ipify.org -w ' [code=%{http_code}]' || echo ' [curl_failed]'"
              echo ""
              echo "─ SOCKS5 (port 50101) exit IP via api.ipify.org ─"
              ssh_run "curl -s --max-time 12 --proxy socks5h://$PROXY_USER:$PROXY_PASS@${ip}:50101 https://api.ipify.org -w ' [code=%{http_code}]' || echo ' [curl_failed]'"
              echo ""
              echo "─ HTTP — instagram.com response code ─"
              ssh_run "curl -s --max-time 15 -o /dev/null -w 'instagram.com [code=%{http_code} time=%{time_total}s]' --proxy http://$PROXY_USER:$PROXY_PASS@${ip}:50100 https://www.instagram.com/ || echo ' [curl_failed]'"
              echo ""
              echo "─ HTTP — instagram /accounts/login/ response code ─"
              ssh_run "curl -s --max-time 15 -o /dev/null -w 'instagram/login [code=%{http_code} time=%{time_total}s]' --proxy http://$PROXY_USER:$PROXY_PASS@${ip}:50100 https://www.instagram.com/accounts/login/ || echo ' [curl_failed]'"
              echo ""
            done
          fi

          # ── TEST_EACH — bypass orchestrator, hit each worker container directly ──
          if [ "$ACTION" = "test_each" ]; then
            for w in 1 2 3 4 5; do
              echo "════════════════════════════════════════════════════════════"
              echo "  WORKER $w"
              echo "════════════════════════════════════════════════════════════"
              echo "─ /health ─"
              ssh_run "docker exec am_worker_${w} curl -s --max-time 5 http://localhost:3010/health" | python3 -m json.tool 2>/dev/null || echo '(invalid json)'
              echo ""
              echo "─ scrape profile @instagram ─"
              # Source .env on the host so SCRAPER_SECRET is expanded by the host shell
              # before docker exec receives the curl args. Otherwise docker exec sees a
              # literal '$SCRAPER_SECRET' string and the worker returns 'unauthorized'.
              ssh_run "source /opt/activitymint/.env && docker exec am_worker_${w} curl -s --max-time 90 -X POST -H \"X-Secret: \$SCRAPER_SECRET\" -H 'Content-Type: application/json' -d '{\"action\":\"profile\",\"payload\":{\"username\":\"instagram\"}}' http://localhost:3010/scrape" | python3 -m json.tool 2>/dev/null | head -25 || echo '(scrape returned non-json)'
              echo ""
            done
          fi

          # ── SMOKE — end-to-end real scrape through the orchestrator ──────
          if [ "$ACTION" = "smoke" ]; then
            echo "==> /health from inside the box"
            ssh_run "source /opt/activitymint/.env && curl -s -H \"X-Secret: \$SCRAPER_SECRET\" http://localhost:3001/health | python3 -m json.tool"
            echo ""
            echo "==> Real scrape: profile @instagram"
            ssh_run "source /opt/activitymint/.env && curl -s -X POST -H \"X-Secret: \$SCRAPER_SECRET\" -H 'Content-Type: application/json' --max-time 120 -d '{\"action\":\"profile\",\"payload\":{\"username\":\"instagram\"}}' http://localhost:3001/scrape | python3 -m json.tool | head -100"
            echo ""
            echo "==> Real scrape: followers @instagram limit=10"
            ssh_run "source /opt/activitymint/.env && curl -s -X POST -H \"X-Secret: \$SCRAPER_SECRET\" -H 'Content-Type: application/json' --max-time 180 -d '{\"action\":\"followers\",\"payload\":{\"username\":\"instagram\",\"limit\":10}}' http://localhost:3001/scrape | python3 -m json.tool | head -100"
          fi

          # ── RESET_WORKER_1 — pull latest config, stop w1, wipe profile_1, restart ──
          # Used after changing worker_1's proxy or credentials. Wiping the persistent
          # profile dir guarantees a fully fresh CloakBrowser session: no stale cookies
          # tied to the old proxy IP or old account, no SingletonLock files. Then bring
          # worker_1 back up and tail its login flow.
          if [ "$ACTION" = "reset_worker_1" ]; then
            echo "==> Pulling latest repo (so docker-compose has the new proxy)..."
            ssh_run "cd /opt/activitymint && git fetch --all && git reset --hard origin/main"

            echo "==> Writing latest .env on Hetzner..."
            echo "$ENV_CONTENT" | sshpass -p "$HETZNER_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o LogLevel=ERROR \
              "$HETZNER_USER@$HETZNER_HOST" \
              "cat > /opt/activitymint/.env && chmod 600 /opt/activitymint/.env"

            echo "==> Stopping + removing worker_1..."
            ssh_run "cd /opt/activitymint && docker compose -f hetzner-cluster/docker-compose.yml --env-file /opt/activitymint/.env stop worker_1 && docker compose -f hetzner-cluster/docker-compose.yml --env-file /opt/activitymint/.env rm -f worker_1"

            echo "==> Wiping /opt/activitymint/profiles/profile_1 contents..."
            ssh_run "rm -rf /opt/activitymint/profiles/profile_1/* /opt/activitymint/profiles/profile_1/.* 2>/dev/null; mkdir -p /opt/activitymint/profiles/profile_1; ls -la /opt/activitymint/profiles/profile_1"

            echo "==> Rebuilding + bringing worker_1 back up..."
            ssh_run "cd /opt/activitymint && docker compose -f hetzner-cluster/docker-compose.yml --env-file /opt/activitymint/.env up -d --build worker_1"

            echo "==> Waiting 35s for CloakBrowser launch + login attempt..."
            sleep 35

            echo "==> Worker_1 health:"
            ssh_run "docker exec am_worker_1 curl -s --max-time 5 http://localhost:3010/health | python3 -m json.tool 2>/dev/null || echo '(unreachable)'"

            echo ""
            echo "==> Worker_1 recent log lines (login flow):"
            ssh_run "docker logs --tail 40 am_worker_1 2>&1"
          fi

          # ── TEST_TIKTOK_LOGIN — one-off CloakBrowser probe of TikTok login ──
          # Spins up a one-shot container based on the existing worker image,
          # mounts probe_tiktok.js into it, and runs it with TikTok credentials
          # and a chosen residential proxy. Captures screenshots + HTML of the
          # initial login page and the post-submit page. Prints final OUTCOME
          # line so we can read it from the workflow log.
          if [ "$ACTION" = "test_tiktok_login" ]; then
            echo "==> Pulling latest repo so probe_tiktok.js is on disk..."
            ssh_run "cd /opt/activitymint && git fetch --all && git reset --hard origin/main"

            ssh_run "docker rm -f am_tt_probe 2>/dev/null; rm -rf /tmp/tt_probe; mkdir -p /tmp/tt_probe && chmod 755 /tmp/tt_probe"

            echo "==> Launching TikTok login probe..."
            ssh_run "docker run --name am_tt_probe --network hetzner-cluster_am_public \
              -e TT_USERNAME='$TT_USERNAME' \
              -e TT_PASSWORD='$TT_PASSWORD' \
              -e TT_EMAIL='$TT_EMAIL' \
              -e PROXY_HOST='$TT_PROXY_HOST' \
              -e PROXY_USER='$PROXY_USER' \
              -e PROXY_PASS='$PROXY_PASS' \
              -e PROXY_HTTP_PORT=50100 \
              -v /opt/activitymint/hetzner-cluster/worker/probe_tiktok.js:/app/probe_tiktok.js:ro \
              -v /tmp/tt_probe:/app/profile \
              hetzner-cluster-worker_1 \
              node probe_tiktok.js 2>&1" || true

            echo ""
            echo "==> Captured files in /tmp/tt_probe:"
            ssh_run "ls -la /tmp/tt_probe/"

            echo ""
            echo "==> Initial page <title> + form structure (last_tt_login_initial.html):"
            ssh_run "grep -oE '(<title>[^<]+|aria-label=\"[^\"]+\"|<input[^>]+(name|placeholder|type)=\"[^\"]+)' /tmp/tt_probe/last_tt_login_initial.html 2>/dev/null | head -40 || echo '(no initial html)'"

            echo ""
            echo "==> Post-submit page <title> + body signals (last_tt_login_after.html):"
            ssh_run "grep -oE '(<title>[^<]+|aria-label=\"[^\"]+\"|<input[^>]+(name|placeholder)=\"[^\"]+\"|class=\"[^\"]*captcha[^\"]*\")' /tmp/tt_probe/last_tt_login_after.html 2>/dev/null | head -40 || echo '(no after html)'"

            echo ""
            echo "==> Cleanup..."
            ssh_run "docker rm -f am_tt_probe 2>/dev/null"
          fi

          # ── DIAGNOSTICS — pull worker HTML dumps to inspect form structure ──
          if [ "$ACTION" = "diagnostics" ]; then
            for w in 1 2 3 4 5; do
              echo "=========================================="
              echo "=== WORKER_${w} DIAGNOSTICS ==="
              echo "=========================================="
              echo "--- URL + page state from worker logs ---"
              ssh_run "docker logs am_worker_${w} 2>&1 | grep -E 'url=|page title|body snippet|WARN|ERROR' | tail -10"
              echo ""
              echo "--- HTML form inputs from /app/profile/last_login_failure.html ---"
              ssh_run "ls -la /opt/activitymint/profiles/profile_${w}/last_login_failure.html 2>/dev/null && grep -oE '<input[^>]+>' /opt/activitymint/profiles/profile_${w}/last_login_failure.html | head -10 || echo '(no HTML dump found)'"
              echo ""
              echo "--- Form-related HTML around inputs ---"
              ssh_run "grep -oE '(<form|<input|aria-label=\"[^\"]+\")' /opt/activitymint/profiles/profile_${w}/last_login_failure.html 2>/dev/null | head -20 || echo '(no HTML)'"
              echo ""
              echo "--- Followers/Following failure dumps (filenames + sizes) ---"
              ssh_run "ls -la /opt/activitymint/profiles/profile_${w}/last_followers_failure.html /opt/activitymint/profiles/profile_${w}/last_following_failure.html 2>/dev/null || echo '(no followers/following dumps)'"
              echo ""
              echo "--- last_followers_failure.html: header-area anchors + buttons ---"
              ssh_run "grep -oE '(href=\"/[A-Za-z0-9._]+/(followers|following)/\"[^>]*>[^<]{0,80})|(<a[^>]*href=\"/[A-Za-z0-9._]+/(followers|following)/\"[^>]*>)|(role=\"link\"[^>]*aria-label=\"[^\"]{0,80}\")' /opt/activitymint/profiles/profile_${w}/last_followers_failure.html 2>/dev/null | head -30 || echo '(no followers HTML)'"
              echo ""
              echo "--- last_followers_failure.html: aria-labels visible in main column ---"
              ssh_run "grep -oE 'aria-label=\"[^\"]{1,80}\"' /opt/activitymint/profiles/profile_${w}/last_followers_failure.html 2>/dev/null | sort -u | head -40 || echo '(no html)'"
              echo ""
              echo "--- Followers/following scrape errors from logs ---"
              ssh_run "docker logs am_worker_${w} 2>&1 | grep -E 'followers|following|modal' | tail -20"
              echo ""
            done
          fi
