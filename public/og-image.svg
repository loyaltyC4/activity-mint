<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="white" opacity="0.03"/>
  <circle cx="1100" cy="530" r="300" fill="white" opacity="0.03"/>
  <!-- Logo icon -->
  <rect x="485" y="140" width="70" height="70" rx="16" fill="url(#icon-bg)" opacity="0.9"/>
  <path d="M508 175 L520 158 L532 168 L544 152" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brand name -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">Activity Mint</text>
  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" opacity="0.8">AI-Powered Social Activity Tracker</text>
  <!-- Feature pills -->
  <rect x="280" y="380" width="160" height="40" rx="20" fill="white" opacity="0.15"/>
  <text x="360" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">Instagram</text>
  <rect x="460" y="380" width="130" height="40" rx="20" fill="white" opacity="0.15"/>
  <text x="525" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">Analytics</text>
  <rect x="610" y="380" width="130" height="40" rx="20" fill="white" opacity="0.15"/>
  <text x="675" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">AI Insights</text>
  <rect x="760" y="380" width="160" height="40" rx="20" fill="white" opacity="0.15"/>
  <text x="840" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" font-weight="600">100% Private</text>
  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="white" opacity="0.5">activitymint.com</text>
